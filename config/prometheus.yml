# Prometheus receives remote-write from Tempo's metrics-generator so TraceQL
# metrics + service graphs have a backing store. Remote-write receiver is
# enabled via the --web.enable-remote-write-receiver flag in docker-compose.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: tempo
    static_configs:
      - targets: ["tempo:3200"]
