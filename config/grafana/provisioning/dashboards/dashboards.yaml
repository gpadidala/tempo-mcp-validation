apiVersion: 1

# Auto-load the bundled dashboards (mounted at /var/lib/grafana/dashboards).
providers:
  - name: tempo-mcp
    orgId: 1
    folder: Tempo MCP
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
