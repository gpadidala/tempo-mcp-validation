# One-command, offline dev stack for validating Tempo's native MCP server.
#   tempo      — system under test; MCP server on at :3200/api/mcp
#   prometheus — backing store for Tempo metrics-generator (remote-write)
#   grafana    — human eyeball path (Explore) onto seeded traces
#
# Image tags are pinned. MCP server requires Tempo >= 2.9 (OSS).
name: tempo-mcp-validation

services:
  tempo:
    image: grafana/tempo:2.10.7
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./config/overrides.yaml:/etc/tempo/overrides.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # HTTP API + /api/mcp (the system under test)
      - "4317:4317"   # OTLP gRPC ingest
      - "4318:4318"   # OTLP HTTP ingest (seed generator targets this)
    # NOTE: the grafana/tempo image is distroless — no shell, wget, or curl — so
    # an in-container HTTP healthcheck is not possible. Readiness is gated from
    # the host instead: `make up` polls http://localhost:3200/ready, and the
    # tests/usecases each wait on /ready before running.

  prometheus:
    image: prom/prometheus:v3.5.4
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.4.4
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceQLStreaming
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_started

volumes:
  tempo-data:
